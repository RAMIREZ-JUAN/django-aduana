
{% extends "base.html" %}
{% load static %}
{% block content %}

<main class="container">
  <div class="row">
    <section class="col-md-4 offset-md-4 mt-5">
      <form action="/signin/" method="POST" class="card card-body">
        {% csrf_token %}
        {{error}}
        <h1 class="text-center">INICIAR SESION</h1>
        <div class="text-center">
        <img src="{% static 'app/images/login.png'%}" width="200" height="200">
        </div>
        {% csrf_token %}

        <div class="mb-3">
          <label for="username">Usuario:</label>
          <input type="text" name="username" id="username" class="form-control" 
          placeholder="Cuael es su nombre de usuario">
        </div>

        <div class="mb-3">
          <label for="password">Contraseña:</label>
          <input type="password" name="password" id="password" class="form-control" 
          placeholder="Escriba su contrseña">
        </div>

        <div class="form-group text-center">
          <button type="submit" class="btn btn-primary" >
            Iniciar Sesion
          </button>
        </div>
    </section>
  </div>
</main>
{% endblock %}
